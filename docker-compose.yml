version: '3.8'

services:
  # === Knowledge API Server ===
  api:
    build: ./api
    container_name: vihat-knowledge-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - upload_data:/data/uploads
    restart: unless-stopped
    networks:
      - vihat-network

  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: vihat-postgres
    environment:
      POSTGRES_DB: vihat_knowledge
      POSTGRES_USER: vihat
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - vihat-network

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: vihat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - vihat-network

  # === Admin Panel (Next.js) ===
  admin-panel:
    build: ./admin-panel
    container_name: vihat-admin-panel
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - vihat-network

  # === Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: vihat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./config/ssl:/etc/nginx/ssl
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - vihat-network

volumes:
  postgres_data:
  redis_data:
  upload_data:

networks:
  vihat-network:
    driver: bridge
